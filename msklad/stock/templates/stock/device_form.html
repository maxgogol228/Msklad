{% load custom_filters %}
{% extends 'stock/base.html' %}
{% block content %}
<h2>{{ title }}</h2>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    
    <div style="margin-bottom: 15px;">
        <label>Название прибора:</label>
        <input type="text" name="name" value="{{ device.name|default:'' }}" required style="width: 100%; padding: 8px; background: #2a2a2a; color: white; border: 1px solid #b22222;">
    </div>
    
    <div style="margin-bottom: 15px;">
        <label>Сборок в день:</label>
        <input type="number" name="production_per_day" value="{{ device.production_per_day|default:1 }}" style="width: 100%; padding: 8px; background: #2a2a2a; color: white; border: 1px solid #b22222;">
    </div>
    
    <div style="margin-bottom: 15px;">
        <label>Изображение:</label>
        {% if device.image %}
            <div><img src="{{ device.image.url }}" style="max-width: 100px;"></div>
        {% endif %}
        <input type="file" name="image" accept="image/*">
    </div>
    
    <h3>Состав прибора</h3>
    <table id="parts-table">
        <thead>
            <tr><th>Деталь</th><th>Количество на прибор</th><th></th></tr>
        </thead>
        <tbody>
            {% for part in parts %}
            <tr>
                <td>
                    <select name="part_ids">
                        <option value="{{ part.id }}">{{ part.name }}</option>
                    </select>
                </td>
                <td>
                    <input type="number" step="0.01" name="quantities" value="{{ device_parts|default:{}|get_item:part.id|default:0 }}" style="width: 100px;">
                </td>
                <td><button type="button" onclick="removeRow(this)">✖</button></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <button type="button" onclick="addRow()" class="btn" style="margin: 10px 0;">+ Добавить деталь</button>
    
    <div>
        <button type="submit" class="btn">Сохранить</button>
        <a href="javascript:history.back()" class="btn" style="background: #333;">Отмена</a>
    </div>
</form>

<script>
function addRow() {
    const table = document.getElementById('parts-table').getElementsByTagName('tbody')[0];
    const newRow = table.insertRow();
    newRow.innerHTML = `
        <td><select name="part_ids">{% for part in parts %}<option value="{{ part.id }}">{{ part.name }}</option>{% endfor %}</select></td>
        <td><input type="number" step="0.01" name="quantities" value="0" style="width: 100px;"></td>
        <td><button type="button" onclick="removeRow(this)">✖</button></td>
    `;
}

function removeRow(btn) {
    btn.closest('tr').remove();
}
</script>
{% endblock %}
