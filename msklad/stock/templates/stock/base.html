<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>М склад</title>
    <style>
        body { font-family: 'Roboto', sans-serif; margin: 0; padding: 0; transition: 0.3s; }
        body.dark { background: #121212; color: #e0e0e0; }
        body.light { background: #f5f5f5; color: #121212; }
        .header { background: #1e1e1e; padding: 15px; color: white; display: flex; justify-content: space-between; }
        .header h1 { color: #b22222; margin: 0; }
        button.theme-toggle { background: #b22222; border: none; color: white; padding: 8px 15px; cursor: pointer; }
        .container { padding: 20px; }
        table { width: 100%; border-collapse: collapse; background: #1e1e1e; }
        body.light table { background: white; }
        th, td { border: 1px solid #b22222; padding: 10px; text-align: left; }
        .btn { background: #b22222; color: white; padding: 5px 10px; text-decoration: none; display: inline-block; }
    </style>
</head>
<body class="dark">
    <div class="header">
        <h1>М СКЛАД</h1>
        <button class="theme-toggle" onclick="toggleTheme()">🌓 Тема</button>
    </div>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <script>
        function toggleTheme() {
            document.body.classList.toggle('light');
            document.body.classList.toggle('dark');
            localStorage.setItem('theme', document.body.className);
        }
        if (localStorage.getItem('theme')) document.body.className = localStorage.getItem('theme');
    </script>
</body>
</html>
