{% extends 'stock/base.html' %}
{% block content %}
<h2>Заказ: {{ part.name }}</h2>

<div style="background: #2a2a2a; padding: 15px; margin: 20px 0; border-left: 4px solid #b22222;">
    <p><strong>Текущий остаток:</strong> {{ part.quantity|floatformat:0 }} шт</p>
    <p><strong>Критический минимум:</strong> {{ part.critical_minimum|floatformat:0 }} шт</p>
    <p><strong>Рекомендуемый заказ:</strong> {{ recommended }} шт</p>
</div>

<form method="post">
    {% csrf_token %}
    <div style="margin-bottom: 15px;">
        <label>Количество для заказа:</label>
        <input type="number" step="0.01" name="quantity" value="{{ recommended }}" required style="width: 100%; padding: 8px; background: #2a2a2a; color: white; border: 1px solid #b22222;">
    </div>
    
    <button type="submit" class="btn">Создать заказ</button>
    <a href="javascript:history.back()" class="btn" style="background: #333;">Отмена</a>
</form>
{% endblock %}
