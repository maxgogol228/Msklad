services:
  - type: web
    name: msklad
    env: python
    buildCommand: "pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --noinput"
    startCommand: "gunicorn msklad.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: msklad-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false

databases:
  - name: msklad-db
    plan: free